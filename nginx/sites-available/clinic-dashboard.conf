# Clinic Dashboard - Optimized Configuration
server {
    listen 80;
    listen [::]:80;
    server_name clinic.qivr.health;
    
    # Redirect to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name clinic.qivr.health;
    
    # SSL Configuration
    ssl_certificate /etc/nginx/ssl/qivr.health.crt;
    ssl_certificate_key /etc/nginx/ssl/qivr.health.key;
    
    # Enable HTTP/2 Server Push
    http2_push_preload on;
    
    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: blob: https:; font-src 'self' data: https:; connect-src 'self' https: wss:; frame-src 'self' https:;" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), interest-cohort=()" always;
    
    root /var/www/clinic-dashboard;
    index index.html;
    
    # Rate limiting
    limit_req zone=general burst=30 nodelay;
    
    # Serve pre-compressed files if they exist
    gzip_static on;
    brotli_static on;
    
    # Cache static assets with long expiry
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        
        # HTTP/2 Server Push for critical vendor chunks
        if ($request_uri = "/") {
            add_header Link "</assets/vendor-react-*.js>; rel=preload; as=script" always;
            add_header Link "</assets/vendor-mui-*.js>; rel=preload; as=script" always;
            add_header Link "</assets/index-*.js>; rel=preload; as=script" always;
            add_header Link "</assets/index-*.css>; rel=preload; as=style" always;
        }
    }
    
    # HTML files - shorter cache, must-revalidate
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        add_header Vary "Accept-Encoding";
    }
    
    # Specific caching for chunked vendor files
    location ~* vendor-.*\.(js|css)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
    }
    
    # Service Worker
    location = /sw.js {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    
    # Manifest file
    location = /manifest.json {
        expires 7d;
        add_header Cache-Control "public";
    }
    
    # API Proxy with caching
    location /api/ {
        proxy_pass http://backend:5050/;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Rate limiting for API
        limit_req zone=api burst=100 nodelay;
        
        # Cache GET requests
        proxy_cache qivr_cache;
        proxy_cache_methods GET HEAD;
        proxy_cache_key "$scheme$request_method$host$request_uri$http_authorization";
        proxy_cache_valid 200 302 5m;
        proxy_cache_valid 404 1m;
        proxy_cache_bypass $http_cache_control $http_authorization;
        proxy_no_cache $http_authorization;
        add_header X-Cache-Status $upstream_cache_status;
    }
    
    # File upload endpoint - no caching
    location /api/upload {
        proxy_pass http://backend:5050/upload;
        proxy_http_version 1.1;
        
        client_max_body_size 100M;
        proxy_request_buffering off;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # SPA fallback - serve index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # Health check endpoint
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "healthy\n";
    }
    
    # Block access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
